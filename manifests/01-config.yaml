apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-config
  namespace: k8s-platform-lab
  labels:
    app: relay
    component: config
    environment: lab
data:
  REDIS_HOST: "redis-0.redis-headless.k8s-platform-lab.svc.cluster.local"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: relay-secret
  namespace: k8s-platform-lab
  labels:
    app: relay
    component: secret
    environment: lab
type: Opaque
stringData:
  REDIS_PASSWORD: StrongPassword123!